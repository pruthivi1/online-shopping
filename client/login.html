<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-card .logo i {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-card h3 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .login-card .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.1rem;
            z-index: 10;
        }
        
        .input-group .form-control {
            padding-left: 48px;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            width: 100%;
            color: white;
            margin-top: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-login .spinner-border {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #a0aec0;
            font-size: 0.85rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #718096;
        }
        
        .register-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px 20px;
        }
        
        /* Role selector */
        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .role-option {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .role-option:hover {
            border-color: #667eea;
            background: #f7fafc;
        }
        
        .role-option.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
        }
        
        .role-option i {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 5px;
        }
        
        .role-option small {
            font-size: 0.8rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="bi bi-shop-window"></i>
        </div>
        <h3>Welcome Back!</h3>
        <p class="subtitle">Login to your account to continue</p>
        
        <form id="loginForm">
            <!-- Role Selector -->
            <div class="role-selector">
                <div class="role-option active" data-role="customer" onclick="selectRole(this)">
                    <i class="bi bi-bag"></i>
                    <div>Customer</div>
                    <small>Shop products</small>
                </div>
                <div class="role-option" data-role="admin" onclick="selectRole(this)">
                    <i class="bi bi-shield-lock"></i>
                    <div>Admin</div>
                    <small>Manage store</small>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-login" id="loginBtn">
                <span id="btnText"><i class="bi bi-box-arrow-in-right me-2"></i>Login</span>
            </button>
            
            <div id="message" class="mt-3"></div>
        </form>
        
        <div class="divider"><span>OR</span></div>
        
        <div class="register-link">
            Don't have an account? <a href="register.html">Create Account</a>
        </div>
    </div>

    <script>
        const API_URL = "https://online-shopping-cp0g.onrender.com/api/auth";
        let selectedRole = "customer";

        // Role selector
        function selectRole(element) {
            document.querySelectorAll('.role-option').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            selectedRole = element.dataset.role;
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem("token");
            const user = JSON.parse(localStorage.getItem("user") || "{}");
            
            if (token && user.role) {
                // Auto-redirect based on role
                redirectBasedOnRole(user.role);
            }
        });

        function redirectBasedOnRole(role) {
            if (role === "admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "index.html";
            }
        }

        // Login form submit
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById("loginBtn");
            const btnText = document.getElementById("btnText");
            const msgDiv = document.getElementById("message");
            
            // Show loading
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            msgDiv.innerHTML = "";
            
            const data = {
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    // Save to localStorage
                    localStorage.setItem("token", result.token);
                    localStorage.setItem("user", JSON.stringify(result.user));
                    
                    // Show success
                    msgDiv.innerHTML = `
                        <div class="alert alert-success">
                            <i class="bi bi-check-circle-fill me-2"></i>Login successful! Redirecting...
                        </div>
                    `;
                    
                    // Redirect based on role
                    setTimeout(() => {
                        redirectBasedOnRole(result.user.role);
                    }, 1000);
                    
                } else {
                    // Show error
                    msgDiv.innerHTML = `
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-circle-fill me-2"></i>${result.message}
                        </div>
                    `;
                    btn.disabled = false;
                    btnText.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
                }
            } catch (error) {
                msgDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-wifi-off me-2"></i>Cannot connect to server. Please try again.
                    </div>
                `;
                btn.disabled = false;
                btnText.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Login';
            }
        });
    </script>
</body>
</html>
