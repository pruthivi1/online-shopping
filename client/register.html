<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .register-card .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .register-card .logo i {
            font-size: 3.5rem;
            color: #11998e;
        }
        
        .register-card h3 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .register-card .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: #11998e;
            box-shadow: 0 0 0 4px rgba(17, 153, 142, 0.15);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.1rem;
            z-index: 10;
        }
        
        .input-group .form-control {
            padding-left: 48px;
        }
        
        .btn-register {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            width: 100%;
            color: white;
            margin-top: 10px;
            transition: all 0.3s;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
        
        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #a0aec0;
            font-size: 0.85rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #718096;
        }
        
        .login-link a {
            color: #11998e;
            font-weight: 600;
            text-decoration: none;
        }
        
        .alert {
            border-radius: 12px;
            border: none;
            padding: 15px 20px;
        }
        
        .password-strength {
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h3>Create Account</h3>
        <p class="subtitle">Join us and start shopping today</p>
        
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" class="form-control" id="username" placeholder="Choose a username" required minlength="3">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <i class="bi bi-envelope input-icon"></i>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" class="form-control" id="password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="password-strength" id="passwordStrength"></div>
                <small class="text-muted">Must be at least 6 characters</small>
            </div>
            
            <button type="submit" class="btn btn-register" id="registerBtn">
                <span id="btnText"><i class="bi bi-person-check me-2"></i>Create Account</span>
            </button>
            
            <div id="message" class="mt-3"></div>
        </form>
        
        <div class="divider"><span>OR</span></div>
        
        <div class="login-link">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api/auth";

        // Password strength indicator
        document.getElementById("password").addEventListener("input", (e) => {
            const strength = document.getElementById("passwordStrength");
            const val = e.target.value;
            
            if (val.length === 0) {
                strength.style.width = "0%";
                strength.style.background = "transparent";
            } else if (val.length < 6) {
                strength.style.width = "30%";
                strength.style.background = "#e74a3b";
            } else if (val.length < 10) {
                strength.style.width = "60%";
                strength.style.background = "#f6c23e";
            } else {
                strength.style.width = "100%";
                strength.style.background = "#1cc88a";
            }
        });

        // Register form submit
        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById("registerBtn");
            const btnText = document.getElementById("btnText");
            const msgDiv = document.getElementById("message");
            
            // Show loading
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';
            msgDiv.innerHTML = "";
            
            const data = {
                username: document.getElementById("username").value.trim(),
                email: document.getElementById("email").value.trim(),
                password: document.getElementById("password").value
            };

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (result.success) {
                    // Show success and redirect to login
                    msgDiv.innerHTML = `
                        <div class="alert alert-success">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            ${result.message}<br>
                            <small>Redirecting to login...</small>
                        </div>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                    
                } else {
                    // Show error
                    msgDiv.innerHTML = `
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-circle-fill me-2"></i>${result.message}
                        </div>
                    `;
                    btn.disabled = false;
                    btnText.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account';
                }
            } catch (error) {
                msgDiv.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-wifi-off me-2"></i>Cannot connect to server. Please try again.
                    </div>
                `;
                btn.disabled = false;
                btnText.innerHTML = '<i class="bi bi-person-check me-2"></i>Create Account';
            }
        });
    </script>
</body>
</html>
