<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Online Shopping</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.25);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        h1, h2, h3, h4, h5, h6, .navbar-brand {
            font-family: 'Outfit', sans-serif;
        }
        .navbar {
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.9) !important;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .order-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.2s;
        }
        .order-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .status-badge {
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 50px;
            text-transform: uppercase;
        }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-shipped { background: #dbeafe; color: #2563eb; }
        .status-delivered { background: #d1fae5; color: #059669; }
        .status-cancelled { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
      <div class="container">
          <a class="navbar-brand" href="index.html">
              <i class="bi bi-bag-heart-fill me-2"></i>ShopEase
          </a>
          <div class="navbar-nav ms-auto align-items-center gap-2">
              <a class="nav-link px-3" href="index.html"><i class="bi bi-house me-1"></i>Home</a>
              <a class="nav-link px-3" href="cart.html"><i class="bi bi-cart3 me-1"></i>Cart</a>
              <a class="nav-link active px-3" href="orders.html"><i class="bi bi-receipt me-1"></i>My Orders</a>
              <a class="nav-link px-3" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-1 text-danger"></i>Logout</a>
          </div>
      </div>
    </nav>

    <div class="container py-5" style="max-width: 900px;">
        <h2 class="mb-4 fw-extrabold"><i class="bi bi-receipt me-2"></i>My Orders</h2>
        
        <div id="ordersContainer">
            <div class="text-center py-5">
                <div class="spinner-border text-primary"></div>
                <p class="mt-2 text-muted">Retrieving your orders...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://online-shopping-cp0g.onrender.com/api/orders";
        const token = localStorage.getItem("token");

        if (!token) {
            window.location.href = "login.html";
        }

        document.addEventListener("DOMContentLoaded", loadMyOrders);

        async function loadMyOrders() {
            try {
                const response = await fetch(API_URL, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const result = await response.json();
                const container = document.getElementById("ordersContainer");

                if (!result.data || result.data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-5 bg-white rounded-4 border p-5 shadow-sm">
                            <i class="bi bi-receipt text-muted" style="font-size: 5rem;"></i>
                            <h4 class="mt-4 fw-bold">No orders found</h4>
                            <p class="text-muted mb-4">You have not placed any orders yet.</p>
                            <a href="index.html" class="btn btn-primary px-5 py-2.5 rounded-pill fw-bold">Start Shopping</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = result.data.map(order => {
                    const date = new Date(order.created_at).toLocaleDateString(undefined, {
                        year: 'numeric', month: 'long', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                    
                    const status = (order.status || 'pending').toLowerCase();
                    let statusClass = "status-pending";
                    if (status === "shipped") statusClass = "status-shipped";
                    else if (status === "delivered" || status === "completed") statusClass = "status-delivered";
                    else if (status === "cancelled") statusClass = "status-cancelled";

                    return `
                        <div class="order-card">
                            <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
                                <div>
                                    <span class="text-muted small">ORDER ID</span>
                                    <h5 class="fw-bold text-dark mb-0">#${order.id}</h5>
                                </div>
                                <span class="status-badge ${statusClass}">${status}</span>
                            </div>
                            
                            <hr class="my-3" style="border-color: #f1f5f9;">
                            
                            <div class="row">
                                <div class="col-md-8">
                                    <span class="text-muted small d-block">PRODUCTS</span>
                                    <div class="fw-semibold text-dark">${order.product_names || 'N/A'}</div>
                                    <div class="text-muted small mt-1">${order.item_count} items</div>
                                </div>
                                <div class="col-md-4 text-md-end mt-3 mt-md-0">
                                    <span class="text-muted small d-block">TOTAL AMOUNT</span>
                                    <h5 class="fw-bold text-primary mb-0">₹${order.total_amount}</h5>
                                </div>
                            </div>
                            
                            <div class="mt-3 bg-light p-2.5 rounded-3">
                                <small class="text-muted"><i class="bi bi-geo-alt me-1"></i>Address: ${order.shipping_address || 'N/A'}</small>
                                <div class="small text-muted mt-1"><i class="bi bi-calendar3 me-1"></i>Placed on: ${date}</div>
                            </div>
                        </div>
                    `;
                }).join("");
            } catch (error) {
                console.error(error);
                document.getElementById("ordersContainer").innerHTML = `
                    <div class="alert alert-danger">Failed to load orders. Please try again.</div>
                `;
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
